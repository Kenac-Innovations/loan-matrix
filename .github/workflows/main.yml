name: loan-matrix CI/CD

on:
  push:
    branches: [main, master, prod, dev, qa, uat]
  pull_request:
    branches: [main, master, prod, dev, qa, uat]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kenac-innovations/loan-matrix
  HARBOR_REGISTRY: harbor.kenac.co.zw
  HARBOR_IMAGE: harbor.kenac.co.zw/kenac/loan-matrix

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      GITOPS_APP_ID: ${{ secrets.GITOPS_APP_ID }}
    permissions:
      contents: read
      packages: write
      actions: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine branch behavior
      id: branch-context
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          BRANCH_NAME="${{ github.head_ref }}"
        else
          BRANCH_NAME="${{ github.ref_name }}"
        fi

        echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

        if [[ "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "master" || "$BRANCH_NAME" == "prod" ]]; then
          echo "environment=prod" >> "$GITHUB_OUTPUT"
          echo "is_deploy_branch=true" >> "$GITHUB_OUTPUT"
        elif [[ "$BRANCH_NAME" == "dev" || "$BRANCH_NAME" == "qa" || "$BRANCH_NAME" == "uat" ]]; then
          echo "environment=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "is_deploy_branch=true" >> "$GITHUB_OUTPUT"
        else
          echo "environment=" >> "$GITHUB_OUTPUT"
          echo "is_deploy_branch=false" >> "$GITHUB_OUTPUT"
        fi

        if [[ "${{ github.event_name }}" == "push" && ( "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "master" || "$BRANCH_NAME" == "prod" || "$BRANCH_NAME" == "dev" || "$BRANCH_NAME" == "qa" || "$BRANCH_NAME" == "uat" ) ]]; then
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
        else
          echo "should_publish=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Docker Buildx
      if: steps.branch-context.outputs.should_publish == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      if: steps.branch-context.outputs.should_publish == 'true'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Harbor Registry
      if: steps.branch-context.outputs.should_publish == 'true'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.HARBOR_REGISTRY }}
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    - name: Extract metadata
      if: steps.branch-context.outputs.should_publish == 'true'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.IMAGE_NAME }}
          ${{ env.HARBOR_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Checkout application repository
      if: steps.branch-context.outputs.should_publish == 'true'
      uses: actions/checkout@v4
      with:
        repository: Kenac-Innovations/loan-matrix
        path: app-source
        fetch-depth: 0

    - name: Build and push Docker image
      if: steps.branch-context.outputs.should_publish == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./app-source
        file: ./app-source/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false

    - name: Determine environment
      if: steps.branch-context.outputs.should_publish == 'true'
      id: env
      run: |
        echo "environment=${{ steps.branch-context.outputs.environment }}" >> "$GITHUB_OUTPUT"

    - name: Extract image tag
      if: steps.branch-context.outputs.should_publish == 'true'
      id: image-tag
      run: |
        TAGS="${{ steps.meta.outputs.tags }}"
        SHA_TAG=$(echo "$TAGS" | grep -E "${{ steps.branch-context.outputs.branch_name }}-[a-f0-9]{7}" | head -1 | cut -d':' -f2)
        if [ -z "$SHA_TAG" ]; then
          # Fallback to branch name if no SHA tag found
          SHA_TAG="${{ steps.branch-context.outputs.branch_name }}"
        fi
        echo "tag=$SHA_TAG" >> $GITHUB_OUTPUT
        echo "Found image tag: $SHA_TAG"

    # GitHub App Token Generation
    - name: Generate GitHub App Token
      id: github-app-token
      if: steps.branch-context.outputs.should_publish == 'true' && env.GITOPS_APP_ID != ''
      uses: tibdex/github-app-token@v2
      with:
        app_id: ${{ secrets.GITOPS_APP_ID }}
        private_key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
        repository: Kenac-Innovations/kenac-gitops

    - name: Checkout GitOps repository
      if: steps.branch-context.outputs.should_publish == 'true'
      uses: actions/checkout@v4
      with:
        repository: Kenac-Innovations/kenac-gitops
        token: ${{ steps.github-app-token.outputs.token || secrets.GITOPS_TOKEN || github.token }}
        path: gitops-repo

    - name: Update image tag in GitOps repo
      if: steps.branch-context.outputs.should_publish == 'true'
      run: |
        cd gitops-repo
        
        ENV="${{ steps.env.outputs.environment }}"
        VALUES_FILE="projects/loan-matrix/environments/${ENV}/values.yaml"
        NEW_TAG="${{ steps.image-tag.outputs.tag }}"
        
        echo "Environment: $ENV"
        echo "Values file path: $VALUES_FILE"
        echo "New tag: $NEW_TAG"
        echo "Current directory: $(pwd)"
        echo "Files in projects directory:"
        ls -la projects/ || echo "No projects directory found"
        echo "Files in loan-matrix directory:"
        ls -la projects/loan-matrix/ || echo "No loan-matrix directory found"
        
        echo "Updating $VALUES_FILE with tag: $NEW_TAG"
        
        if ! command -v yq &> /dev/null; then
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
        fi
        
        yq eval ".image.repository = \"harbor.kenac.co.zw/kenac/loan-matrix\"" -i "$VALUES_FILE"
        yq eval ".image.tag = \"$NEW_TAG\"" -i "$VALUES_FILE"
        
        echo "Updated values file:"
        cat "$VALUES_FILE"

    - name: Commit and push changes
      if: steps.branch-context.outputs.should_publish == 'true'
      run: |
        cd gitops-repo
        
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if git diff --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        ENV="${{ steps.env.outputs.environment }}"
        NEW_TAG="${{ steps.image-tag.outputs.tag }}"
        
        git add .
        git commit -m "Update loan-matrix image tag to $NEW_TAG for $ENV environment
        
        - Updated by GitHub Actions
        - Commit: ${{ github.sha }}
        - Branch: ${{ github.ref_name }}
        - Workflow: ${{ github.workflow }}"
        
        git push origin master

    - name: Deployment summary
      if: steps.branch-context.outputs.should_publish == 'true'
      run: |
        echo "Deployment Summary:"
        echo "- Environment: ${{ steps.env.outputs.environment }}"
        echo "- Image Tag: ${{ steps.image-tag.outputs.tag }}"
        echo "- Pushed to: GHCR + Harbor"
        echo "- GitOps repo updated (pulling from Harbor)"
        echo "- ArgoCD will automatically sync the changes"

    - name: CI summary when publish is skipped
      if: steps.branch-context.outputs.should_publish != 'true'
      run: |
        echo "CI Summary:"
        echo "- Branch: ${{ steps.branch-context.outputs.branch_name }}"
        echo "- Deploy branch: ${{ steps.branch-context.outputs.is_deploy_branch }}"
        echo "- Publish triggered by push to deploy branch: false"
        echo "- Docker image push skipped"
        echo "- GitOps update skipped"
